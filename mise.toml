
[tasks.install]
description = "Install this machine"
alias = "i"
run = "sudo ./install.sh"

[tasks.setup]
description = "Kamal bootstrap for accessories (server bootstrap + proxy + all accessories)"
alias = "ks"
run = """
set -euo pipefail
kamal server bootstrap
kamal proxy boot
kamal accessory reboot all || kamal accessory boot all
"""

[tasks.bootstrap-remote-ssh]
description = "From host: add local SSH key to remote and harden SSH (set TARGET=user@host)"
run = """
set -euo pipefail
: "${TARGET:?Set TARGET=user@host, e.g. TARGET=deployer@my-vps.local}"
./scripts/bootstrap-remote-ssh.sh "$TARGET"
"""

[tasks.playwright-chromium]
description = "Install/update Playwright Chromium browser for screenshot tooling"
alias = "pwc"
run = "mise exec npm:playwright@1.59.1 -- playwright install chromium"
