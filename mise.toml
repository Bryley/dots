[tasks.install]
description = "Install this machine (auto-detect distro, prompts for VPS mode)"
alias = "i"
run = "sudo ./install.sh"

[tasks.vps]
description = "Install this machine and force VPS setup (IS_VPS=yes)"
alias = "iv"
run = "sudo IS_VPS=yes ./install.sh"

[tasks.setup]
description = "Kamal bootstrap for accessories (server bootstrap + proxy + all accessories)"
alias = "ks"
run = """
set -euo pipefail
kamal server bootstrap
kamal proxy boot
kamal accessory boot all
"""

[tasks.bootstrap-remote-ssh]
description = "From host: add local SSH key to remote and harden SSH (set TARGET=user@host)"
run = """
set -euo pipefail
: "${TARGET:?Set TARGET=user@host, e.g. TARGET=deployer@my-vps.local}"
./scripts/bootstrap-remote-ssh.sh "$TARGET"
"""

[tasks.test-ubuntu]
description = "Run Docker-based install test against Ubuntu"
run = "printf 'ubuntu\nn\n' | ./test.sh"

[tasks.test-fedora]
description = "Run Docker-based install test against Fedora"
run = "printf 'fedora\nn\n' | ./test.sh"
