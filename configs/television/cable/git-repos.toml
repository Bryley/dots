[metadata]
name = "git-repos"
requirements = ["fd", "git"]
description = "A channel to select from git repositories on your local machine"

[source]
# Search for git repository roots under $HOME.
# Hidden traversal is required to find .git directories, so known dependency/cache
# sinks are excluded aggressively to keep the channel responsive.
command = '''
fd '^\.git$' "$HOME" \
  --hidden \
  --no-require-git \
  --type directory \
  --prune \
  --exclude .bun \
  --exclude .cache \
  --exclude .cargo \
  --exclude .config \
  --exclude .local \
  --exclude .npm \
  --exclude .rustup \
  --exclude Library \
  --exclude node_modules \
  --exclude target \
  --exclude vendor \
  --exclude site-packages \
  --exclude registry \
  --exclude golang.org \
| while IFS= read -r git_dir; do
  repo="${git_dir%/}"
  printf '%s\n' "${repo%/.git}"
done
'''
display = "{split:/:-1}"

[preview]
# Avoid wrapping {} in quotes: tv already handles argument escaping.
command = "repo={}; printf 'PATH: %s\\n\\n' \"$(cd -- \"$repo\" && pwd)\"; cd -- \"$repo\" && git log -n 200 --pretty=medium --all --graph --color"

[keybindings]
shortcut = "f1"
