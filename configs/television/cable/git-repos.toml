[metadata]
name = "git-repos"
requirements = ["fd", "git"]
description = "A channel to select from git repositories on your local machine"

[source]
# macOS-friendly defaults (same spirit as upstream channel)
command = "fd -g .git -HL -t d -d 10 --prune ~ -E 'Library' -E 'Application Support' --exec dirname '{}'"
display = "{split:/:-1}"

[preview]
# Avoid wrapping {} in quotes: tv already handles argument escaping.
command = "cd {}; git log -n 200 --pretty=medium --all --graph --color"

[keybindings]
shortcut = "f1"
