# Use bash for channel source/preview/action commands so cable files can use
# portable POSIX-ish shell snippets even when the interactive shell is Nushell.
shell = "bash"
default_channel = "git-repos"

[keybindings]
# Preview scrolling (Neovim-ish)
ctrl-u = "scroll_preview_half_page_up"
ctrl-d = "scroll_preview_half_page_down"
ctrl-y = "scroll_preview_up"
ctrl-e = "scroll_preview_down"
ctrl-k = "scroll_preview_up"
ctrl-j = "scroll_preview_down"

[shell_integration.channel_triggers]
"env" = ["export", "unset"]
"dirs" = ["cd", "ls", "rmdir", "z"]
"files" = ["cat", "less", "head", "tail", "nvim", "vim", "cp", "mv", "rm", "touch"]
"git-branch" = ["git checkout", "git branch", "git merge", "git rebase", "git pull", "git push"]
"git-diff" = ["git add", "git restore"]
"git-log" = ["git log", "git show"]

[shell_integration.keybindings]
smart_autocomplete = "ctrl-t"
command_history = "ctrl-r"
