# Keyboard / input
xkb_rules_options=ctrl:nocaps
tap_to_click=0

# Autostart
exec-once=quickshell
exec-once=/run/current-system/sw/bin/lxqt-policykit-agent
exec-once=sh -c 'swww-daemon && swww img ~/wallpaper'
exec-once=/run/current-system/sw/bin/swayidle timeout 300 '/run/current-system/sw/bin/hyprlock' timeout 600 '/home/bryley/dots/configs/mango/bin/monitor-power off' resume '/home/bryley/dots/configs/mango/bin/monitor-power on' before-sleep '/run/current-system/sw/bin/hyprlock'

# Monitor layout
# External dock monitor (DP-1) above laptop panel (eDP-1)
# Using detected native modes from /sys/class/drm: DP-1=3440x1440, eDP-1=2880x1800
monitorrule=name:^DP-1$,width:3440,height:1440,x:0,y:0
monitorrule=name:^eDP-1$,width:2880,height:1800,x:0,y:1440

###########
## Binds ##
###########

# App launchers
# Use keycode for Enter for better reliability across layouts.
bind=SUPER,code:36,spawn,/run/current-system/sw/bin/ghostty
bind=SUPER,Space,spawn,/run/current-system/sw/bin/wofi --show drun
bind=SUPER,B,spawn,/run/current-system/sw/bin/helium --force-device-scale-factor=1.20

# Window management
bind=SUPER,Q,killclient
bind=SUPER,Escape,spawn,/run/current-system/sw/bin/hyprlock
# Smart focus: use directional focus first, fall back to stack focus
bind=SUPER,H,spawn,/home/bryley/dots/configs/mango/bin/focus-smart left
bind=SUPER,J,spawn,/home/bryley/dots/configs/mango/bin/focus-smart down
bind=SUPER,K,spawn,/home/bryley/dots/configs/mango/bin/focus-smart up
bind=SUPER,L,spawn,/home/bryley/dots/configs/mango/bin/focus-smart right
# Move window: tiled=swap position, floating=move window
bind=SUPER+SHIFT,H,spawn,/home/bryley/dots/configs/mango/bin/move-smart left
bind=SUPER+SHIFT,J,spawn,/home/bryley/dots/configs/mango/bin/move-smart down
bind=SUPER+SHIFT,K,spawn,/home/bryley/dots/configs/mango/bin/move-smart up
bind=SUPER+SHIFT,L,spawn,/home/bryley/dots/configs/mango/bin/move-smart right

# Resize: tiled=layout resize, floating=window resize
bind=SUPER,Left,spawn,/home/bryley/dots/configs/mango/bin/resize-smart left
bind=SUPER,Right,spawn,/home/bryley/dots/configs/mango/bin/resize-smart right
bind=SUPER,Up,spawn,/home/bryley/dots/configs/mango/bin/resize-smart up
bind=SUPER,Down,spawn,/home/bryley/dots/configs/mango/bin/resize-smart down
# Fullscreen-like mode without changing layout
bind=SUPER,Z,togglemaximizescreen
bind=SUPER,F,togglefloating

# Tags / workspaces (Hyprland-like)
# Navigate horizontally between tags
bind=SUPER+CTRL,H,viewtoleft,0
bind=SUPER+CTRL,L,viewtoright,0

# Move focused window between tags (left/right)
bind=SUPER+CTRL+SHIFT,H,tagtoleft,0
bind=SUPER+CTRL+SHIFT,L,tagtoright,0

# Monitor navigation (vertical stack)
bind=SUPER+CTRL,K,focusmon,up
bind=SUPER+CTRL,J,focusmon,down

# Move focused window between monitors (vertical stack)
bind=SUPER+CTRL+SHIFT,K,tagmon,up
bind=SUPER+CTRL+SHIFT,J,tagmon,down

# Direct jump to tag 1-9
bind=SUPER,1,view,1,0
bind=SUPER,2,view,2,0
bind=SUPER,3,view,3,0
bind=SUPER,4,view,4,0
bind=SUPER,5,view,5,0
bind=SUPER,6,view,6,0
bind=SUPER,7,view,7,0
bind=SUPER,8,view,8,0
bind=SUPER,9,view,9,0

# Move focused window to tag 1-9
bind=SUPER+SHIFT,1,tag,1,0
bind=SUPER+SHIFT,2,tag,2,0
bind=SUPER+SHIFT,3,tag,3,0
bind=SUPER+SHIFT,4,tag,4,0
bind=SUPER+SHIFT,5,tag,5,0
bind=SUPER+SHIFT,6,tag,6,0
bind=SUPER+SHIFT,7,tag,7,0
bind=SUPER+SHIFT,8,tag,8,0
bind=SUPER+SHIFT,9,tag,9,0

# Mango management
bind=SUPER+SHIFT,R,reload_config
bind=SUPER+SHIFT,Escape,quit


##########################
## Tile Layout Settings ##
##########################

# Gaps
smartgaps = 0
gappih = 10
gappiv = 10
gappoh = 15
gappov = 15

# Floating move/resize step size (used by smartmovewin/smartresizewin)
snap_distance = 15

# Match Niri focused ring color + yellow maximize color
focuscolor = 0x0076dcaa
maximizescreencolor = 0xf2c94cff
no_border_when_single = 0

border_radius = 20

# Master
default_nmaster = 1
default_mfact = 0.50
new_is_master = 0

# Center Tile
center_master_overspread = 0
center_when_single_stack = 1

# Scroller
scroller_structs = 20
scroller_default_proportion = 0.90
scroller_default_proportion_single = 1.00
scroller_ignore_proportion_single = 1
scroller_focus_center = 0
scroller_prefer_center = 0
scroller_prefer_overspread = 1

# Overview
overviewgappi = 5
overviewgappo = 30
